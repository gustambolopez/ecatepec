<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover"
    />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />

    <title>Ecatepec Music</title>
    <link
      rel="preload"
      as="image"
      href="https://framerusercontent.com/images/zL3PEjX0vftOWNT8u24lzNacUGo.png"
    />
    <link
      href="https://framerusercontent.com/images/EKbJ5Et5vOKk2VINxvmhpPX6Lg8.png"
      rel="icon"
      media="(prefers-color-scheme: light)"
    />
    <link
      href="https://framerusercontent.com/images/2ftPQzxkEbdaN5saVSRnmHSVODI.png"
      rel="icon"
      media="(prefers-color-scheme: dark)"
    />
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/color-thief/2.3.0/color-thief.umd.js"></script>
    <style>
      @font-face {
        font-display: swap;
        font-family: "Spotify Mix";
        font-style: normal;
        font-weight: 400;
        src: url(https://cdn.jsdelivr.net/gh/gustambolopez/Files@main/SpotifyMix-Regular.woff2)
          format("woff2");
      }

      @font-face {
        font-display: swap;
        font-family: "SF Pro Text";
        font-style: normal;
        font-weight: 400;
        src: url(https://cdn.jsdelivr.net/gh/gustambolopez/Files@main/sf-pro-text_regular.woff2)
          format("woff2");
      }

      :root {
        --accent: #1a1a1a;
        --accent-foreground: oklch(0.92 0 0);
        --background: oklch(0.08 0 0);
        --border: oklch(1 0 0 / 8%);
        --card: oklch(0.12 0 0);
        --card-foreground: oklch(0.92 0 0);
        --foreground: oklch(0.92 0 0);
        --input: oklch(1 0 0 / 12%);
        --muted: oklch(0.18 0 0);
        --muted-foreground: oklch(0.55 0 0);
        --primary: oklch(0.75 0 0);
        --primary-foreground: #0a0a0a;
        --radius: 0.75rem;
        --ring: oklch(0.4 0 0);
        --secondary: oklch(0.18 0 0);
        --secondary-foreground: oklch(0.92 0 0);
        --sidebar-width: 280px;
        --player-height: 90px;
        --mobile-player-height: 140px;
        --orb-1: #474747e6;
        --orb-2: #ffffffeb;
        --orb-3: #d3d3d3cc;
        --orb-4: #020202bf;
        --color-1: #ffffff;
        --color-2: #cccccc;
        --color-3: #999999;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: "SF Pro Text", sans-serif;
        background-color: var(--background);
        color: var(--foreground);
        overflow: hidden;
        height: 100vh;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      input,
      textarea {
        font-family: "Spotify Mix", sans-serif;
        -webkit-appearance: none;
        -moz-appearance: none;
        appearance: none;
        background: transparent !important;
        border: none;
        color: inherit;
        outline: none;
      }

      input::placeholder,
      textarea::placeholder {
        color: var(--muted-foreground);
        opacity: 1;
      }

      #dynamicBg {
        position: fixed;
        inset: 0;
        background: radial-gradient(
            circle at 20% 30%,
            var(--orb-1) 0%,
            transparent 50%
          ),
          radial-gradient(circle at 80% 20%, var(--orb-2) 0%, transparent 50%),
          radial-gradient(circle at 50% 80%, var(--orb-3) 0%, transparent 50%),
          radial-gradient(circle at 30% 70%, var(--orb-4) 0%, transparent 50%);
        filter: blur(80px) brightness(0.5) saturate(2.5);
        opacity: 0;
        z-index: 0;
        pointer-events: none;
        animation: orbPulse 8s ease-in-out infinite;
        transition: opacity 900ms cubic-bezier(0.2, 0.9, 0.2, 1),
          filter 900ms cubic-bezier(0.2, 0.9, 0.2, 1);
      }

      @keyframes orbPulse {
        0%,
        100% {
          opacity: 0.8;
          transform: scale(1) rotate(0deg);
        }
        50% {
          opacity: 0.6;
          transform: scale(1.1) rotate(5deg);
        }
      }

      #dynamicBg.playing {
        opacity: 0.85;
        filter: blur(80px) brightness(0.7) saturate(3);
      }

      .rhythm-glow {
        position: fixed;
        inset: 0;
        background: radial-gradient(
          circle at center,
          rgba(255, 255, 255, 0.08),
          transparent 70%
        );
        opacity: 0;
        pointer-events: none;
        z-index: 1;
        transition: opacity 0.1s linear;
      }

      .desktop-container {
        position: relative;
        display: flex;
        height: calc(100vh - var(--player-height));
        z-index: 2;
      }

      .sidebar {
        width: var(--sidebar-width);
        background: var(--card);
        border-right: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        padding: 24px 12px;
        overflow-y: auto;
        transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      }

      .sidebar::-webkit-scrollbar {
        width: 6px;
      }
      .sidebar::-webkit-scrollbar-track {
        background: transparent;
      }
      .sidebar::-webkit-scrollbar-thumb {
        background: var(--muted);
        border-radius: 3px;
      }

      .sidebar-header {
        padding: 0 12px 24px;
      }

      .logo {
        display: flex;
        align-items: center;
        gap: 12px;
        font-size: 24px;
        font-weight: 700;
        letter-spacing: -0.02em;
        font-family: "Spotify Mix", sans-serif;
      }

      .logo i {
        width: 32px;
        height: 32px;
        color: var(--foreground);
      }

      .sidebar-nav {
        display: flex;
        flex-direction: column;
        gap: 4px;
        padding: 0 0 16px;
      }

      .nav-item {
        display: flex;
        align-items: center;
        gap: 16px;
        padding: 12px 16px;
        border-radius: 8px;
        color: var(--muted-foreground);
        text-decoration: none;
        font-size: 14px;
        font-weight: 500;
        transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
        cursor: pointer;
        font-family: "Spotify Mix", sans-serif;
      }

      .nav-item i {
        width: 24px;
        height: 24px;
      }

      .nav-item:hover {
        color: var(--foreground);
        background-color: rgba(255, 255, 255, 0.05);
      }

      .nav-item.active {
        color: var(--foreground);
        background-color: rgba(255, 255, 255, 0.1);
      }

      .sidebar-divider {
        height: 1px;
        background: var(--border);
        margin: 8px 0 16px;
      }

      .sidebar-playlists {
        display: flex;
        flex-direction: column;
        gap: 8px;
        flex: 1;
      }

      .playlist-create,
      .playlist-liked {
        display: flex;
        align-items: center;
        gap: 16px;
        padding: 12px 16px;
        border-radius: 8px;
        background: none;
        border: none;
        color: var(--muted-foreground);
        font-size: 14px;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
      }

      .playlist-create i,
      .playlist-liked i {
        width: 24px;
        height: 24px;
      }

      .playlist-create:hover,
      .playlist-liked:hover {
        color: var(--foreground);
        background-color: rgba(255, 255, 255, 0.05);
      }

      .sidebar-footer {
        margin-top: auto;
        padding-top: 16px;
      }

      .service-selector {
        display: flex;
        align-items: center;
        gap: 12px;
        width: 100%;
        padding: 12px 16px;
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid var(--border);
        color: var(--foreground);
        font-size: 14px;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
      }

      .service-selector i {
        width: 20px;
        height: 20px;
      }

      .service-selector:hover {
        background: rgba(255, 255, 255, 0.08);
        transform: scale(1.02);
      }

      .main-content {
        flex: 1;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        background: linear-gradient(
          180deg,
          rgba(0, 0, 0, 0.4) 0%,
          transparent 100%
        );
      }

      .main-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 16px 32px;
        background: var(--card);
        border-bottom: 1px solid var(--border);
      }

      .search-container {
        display: flex;
        align-items: center;
        gap: 12px;
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid var(--border);
        border-radius: 500px;
        padding: 10px 20px;
        max-width: 450px;
        width: 100%;
        transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      }

      .search-container:focus-within {
        background: rgba(255, 255, 255, 0.12);
        border-color: var(--foreground);
        box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.05);
      }

      .search-container i {
        width: 20px;
        height: 20px;
        color: var(--muted-foreground);
      }

      .search-container input {
        flex: 1;
        font-size: 14px;
        font-weight: 400;
      }

      .header-actions {
        display: flex;
        gap: 8px;
      }

      .header-btn {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid var(--border);
        color: var(--foreground);
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
      }
      #searchInput {
        color: var(--muted-foreground);
        border-radius: 8px;
        font-size: 14px;
        outline: none;
        transition: border 0.2s ease, box-shadow 0.2s ease;
      }

      #searchInput::placeholder {
        color: var(--muted-foreground);
      }

      #searchInput:focus {
        color: var(--muted-foreground);
      }

      #searchInput {
        -webkit-appearance: none;
        appearance: none;

        color: var(--muted-foreground);
      }

      .header-btn i {
        width: 20px;
        height: 20px;
      }

      .header-btn:hover {
        background: rgba(255, 255, 255, 0.1);
        transform: scale(1.05);
      }

      .header-btn.active {
        background: var(--foreground);
        color: var(--background);
      }

      .content-wrapper {
        flex: 1;
        overflow-y: auto;
        padding: 32px;
        position: relative;
      }

      .content-wrapper::-webkit-scrollbar {
        width: 12px;
      }
      .content-wrapper::-webkit-scrollbar-track {
        background: transparent;
      }
      .content-wrapper::-webkit-scrollbar-thumb {
        background: var(--muted);
        border-radius: 6px;
      }

      .search-results-section {
        display: none;
      }

      .search-results-section.active {
        display: block;
        animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      }

      .section-header h2 {
        font-size: 28px;
        font-weight: 700;
        margin-bottom: 24px;
        letter-spacing: -0.02em;
      }

      .results-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
        gap: 20px;
      }

      .result-item {
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 16px;
        cursor: pointer;
        transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        opacity: 0;
        transform: translateY(20px);
      }

      .result-item.visible {
        opacity: 1;
        transform: translateY(0);
      }

      .result-item:hover {
        background: rgba(255, 255, 255, 0.1);
        transform: translateY(-4px);
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
      }

      .result-item.active {
        background: rgba(255, 255, 255, 0.15);
        border-color: var(--foreground);
      }

      .result-art {
        width: 100%;
        aspect-ratio: 1;
        border-radius: 8px;
        overflow: hidden;
        background: var(--muted);
        margin-bottom: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .result-art img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .result-text {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }

      .result-title {
        font-size: 14px;
        font-weight: 600;
        color: var(--foreground);
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .result-artist {
        font-size: 12px;
        color: var(--muted-foreground);
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .loading-more {
        display: none;
        justify-content: center;
        padding: 40px;
        grid-column: 1 / -1;
      }

      .spinner {
        width: 32px;
        height: 32px;
        border: 3px solid var(--muted);
        border-top-color: var(--foreground);
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      .lyrics-main-view {
        display: none;
        animation: fadeIn 0.5s cubic-bezier(0.16, 1, 0.3, 1);
      }

      .lyrics-main-view.active {
        display: block;
      }

      .lyrics-header {
        margin-bottom: 32px;
      }

      .lyrics-header h2 {
        font-size: 48px;
        font-weight: 700;
        letter-spacing: -0.03em;
      }

      .lyrics-scroll-container {
        max-width: 900px;
        margin: 0 auto;
      }

      .lyrics-container {
        padding: 40px 0;
      }

      .lyrics-line {
        font-family: "SF Pro Text", sans-serif;
        font-size: 3rem;
        line-height: 1.1;
        letter-spacing: -0.023em;
        font-weight: 700;
        color: rgba(255, 255, 255, 0.35);
        margin: 16px 0;
        padding: 12px 20px;
        border-radius: 12px;
        cursor: pointer;
        transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        opacity: 1;
        transform: translateX(0);
      }

      .lyrics-line.active {
        color: #ffffff;
        font-size: 2.8rem;
        font-weight: 700;
        transform: translateX(12px);
        text-shadow: 0 2px 20px rgba(255, 255, 255, 0.3);
      }

      .lyrics-line.active ~ .lyrics-line {
        color: rgb(255, 255, 255);
        opacity: 0.6;
      }

      .lyrics-line:hover {
        color: rgba(255, 255, 255, 0.7);
        transform: translateX(8px);
      }
      .lyrics-line .line-text {
        display: inline;
      }
      .lyrics-line .word {
        display: inline-block;
        margin: 0 4px;

        will-change: transform, filter;
        transform: translateZ(0);

        transition: transform 0.65s cubic-bezier(0.22, 1, 0.36, 1),
          color 0.35s ease, text-shadow 0.35s ease, filter 0.35s ease,
          opacity 0.35s ease;

        color: rgba(255, 255, 255, 0.75);
      }

      .lyrics-line.active .word.active-word {
        transform: translateY(-12px) scale(1.08);
        color: #fff;
        font-weight: 800;

        text-shadow: 0 2px 12px rgba(255, 255, 255, 0.35),
          0 8px 30px rgba(255, 255, 255, 0.22);

        filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.35));
      }

      .lyrics-line.active .word.active-word + .word,
      .lyrics-line.active .word:has(+ .active-word) {
        transform: translateY(-4px) scale(1.03);
        opacity: 0.92;

        transition-duration: 0.75s;
        transition-delay: 50ms;
      }
      .sync-button {
        position: fixed;
        bottom: 120px;
        right: 32px;
        width: 56px;
        height: 56px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.95);
        border: 2px solid var(--border);
        color: var(--background);
        cursor: pointer;
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 250;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
        transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        opacity: 0;
        transform: scale(0.8);
      }

      .sync-button.visible {
        display: flex;
        opacity: 1;
        transform: scale(1);
      }

      .sync-button:hover {
        transform: scale(1.1);
        box-shadow: 0 12px 32px rgba(0, 0, 0, 0.6);
      }

      .sync-button i {
        width: 24px;
        height: 24px;
      }

      .lyrics-fallback {
        text-align: center;
        color: var(--muted-foreground);
        font-style: italic;
        padding: 40px;
      }

      .player-bar {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        height: var(--player-height);
        background: rgba(0, 0, 0, 0.9);
        backdrop-filter: blur(60px);
        border-top: 1px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 16px;
        z-index: 100;
      }

      .player-left {
        display: flex;
        align-items: center;
        gap: 16px;
        flex: 1;
        min-width: 0;
      }

      .player-artwork {
        width: 56px;
        height: 56px;
        border-radius: 8px;
        background: var(--muted);
        overflow: hidden;
        flex-shrink: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
      }

      .player-artwork img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        opacity: 0;
        transition: opacity 0.3s ease;
      }

      .player-artwork img.loaded {
        opacity: 1;
      }

      .player-artwork i {
        width: 28px;
        height: 28px;
        color: var(--muted-foreground);
      }

      .player-info {
        display: flex;
        flex-direction: column;
        gap: 4px;
        min-width: 0;
        flex: 1;
      }

      .player-title {
        font-size: 14px;
        font-weight: 600;
        color: var(--foreground);
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .player-artist {
        font-size: 12px;
        color: var(--muted-foreground);
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .player-like {
        background: none;
        border: none;
        color: var(--muted-foreground);
        cursor: pointer;
        padding: 8px;
        border-radius: 50%;
        transition: all 0.2s ease;
      }

      .player-like i {
        width: 20px;
        height: 20px;
      }

      .player-like:hover {
        color: var(--foreground);
        background: rgba(255, 255, 255, 0.05);
        transform: scale(1.1);
      }

      .player-center {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 8px;
        flex: 2;
        max-width: 722px;
      }

      .player-controls {
        display: flex;
        align-items: center;
        gap: 16px;
      }

      .control-btn {
        background: none;
        border: none;
        color: var(--foreground);
        cursor: pointer;
        padding: 8px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
      }

      .control-btn i {
        width: 20px;
        height: 20px;
      }

      .control-btn:hover:not(:disabled) {
        background: rgba(255, 255, 255, 0.1);
        transform: scale(1.1);
      }

      .control-btn:active:not(:disabled) {
        transform: scale(0.95);
      }

      .control-btn.active {
        color: #fff;
      }

      .control-play {
        background: var(--foreground);
        color: var(--background);
        width: 40px;
        height: 40px;
      }

      .control-play i {
        width: 24px;
        height: 24px;
      }

      .control-play:hover {
        transform: scale(1.08);
        background: var(--foreground);
      }

      .player-progress-wrapper {
        display: flex;
        align-items: center;
        gap: 12px;
        width: 100%;
      }

      .time-label {
        font-size: 11px;
        color: var(--muted-foreground);
        font-family: "Geist Mono", monospace;
        min-width: 40px;
        text-align: center;
      }

      .progress-container {
        flex: 1;
        position: relative;
      }

      .progress-bar {
        -webkit-appearance: none;
        appearance: none;
        width: 100%;
        height: 16px;
        background: transparent;
        cursor: pointer;
        --p: 50%;
      }

      .progress-bar::-webkit-slider-runnable-track {
        height: 4px;
        border-radius: 2px;
        background: linear-gradient(
          to right,
          var(--foreground) 0%,
          var(--foreground) var(--p),
          var(--muted) var(--p),
          var(--muted) 100%
        );
        transition: height 0.2s ease;
      }

      .progress-bar::-moz-range-track {
        height: 4px;
        border-radius: 2px;
        background: linear-gradient(
          to right,
          var(--foreground) 0%,
          var(--foreground) var(--p),
          var(--muted) var(--p),
          var(--muted) 100%
        );
        transition: height 0.2s ease;
      }

      .progress-bar:hover::-webkit-slider-runnable-track,
      .progress-bar:hover::-moz-range-track {
        height: 6px;
      }

      .progress-bar::-webkit-slider-thumb {
        -webkit-appearance: none;
        width: 12px;
        height: 12px;
        border-radius: 50%;
        background: var(--foreground);
        margin-top: -4px;
        opacity: 0;
        transition: opacity 0.2s ease, transform 0.15s ease;
      }

      .progress-bar::-moz-range-thumb {
