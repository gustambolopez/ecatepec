            class="control-btn control-play"
            title="Play/Pause (Space)"
          >
            <i data-lucide="play-circle"></i>
          </button>
          <button id="nextButton" class="control-btn" title="Next (→)">
            <i data-lucide="skip-forward"></i>
          </button>
          <button id="repeatButton" class="control-btn" title="Repeat (r)">
            <i data-lucide="repeat"></i>
          </button>
        </div>
        <div class="player-progress-wrapper">
          <span id="currentTime" class="time-label">0:00</span>
          <div class="progress-container">
            <input
              type="range"
              min="0"
              max="100"
              value="0"
              class="progress-bar"
              id="progressBar"
            />
          </div>
          <span id="duration" class="time-label">0:00</span>
        </div>
      </div>

      <div class="player-right">
        <button id="lyricsToggle" class="control-btn" title="Lyrics (l)">
          <i data-lucide="mic-vocal"></i>
        </button>

        <div class="volume-control">
          <button id="muteButton" class="control-btn" title="Volume (m)">
            <i data-lucide="volume-2"></i>
          </button>
          <input
            type="range"
            id="volumeSlider"
            min="0"
            max="1"
            step="0.01"
            value="1"
            class="volume-slider"
          />
        </div>
      </div>
    </div>

    <div id="dropdownOverlay" class="dropdown-overlay"></div>
    <div class="custom-dropdown" id="serviceDropdown">
      <div class="dropdown-option" data-service="soundcloud">
        <span>SoundCloud<span class="label">Faster</span></span>
        <i data-lucide="cloud"></i>
      </div>
      <div class="dropdown-option" data-service="tidal">
        <span>Tidal<span class="label">More Songs</span></span>
        <i data-lucide="disc-3"></i>
      </div>
    </div>

    <div id="modalOverlay" class="modal-overlay">
      <div class="modal-content">
        <div id="modalText"></div>
        <button id="modalButton">OK</button>
      </div>
    </div>

    <div class="tip-indicator" id="tipIndicator">
      <div class="tip-header">
        <i data-lucide="lightbulb"></i>
        <span id="tipTitle">Tip</span>
      </div>
      <div class="tip-text" id="tipText"></div>
    </div>
    <button class="sync-button" id="syncButton" title="Jump to current line">
      <i data-lucide="fast-forward"></i>
    </button>
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const CONSTANTS = {
          DEFAULT_MUSIC_PROVIDER_KEY: "default_music_provider",
          RESULTS_PER_PAGE: 20,
          CORS_PROXY: "",
          SEEK_THRESHOLD: 3,
          SEARCH_DEBOUNCE: 300,
          RHYTHM_THRESHOLD: 180,
          RHYTHM_COOLDOWN: 200,
          TIP_DISPLAY_DURATION: 5000,
        };

        const TIPS = [
          {
            title: "Keyboard Shortcuts",
            text: "Use Space to play/pause, ← → to skip tracks, L for lyrics",
          },
          {
            title: "Clean Mode",
            text: "Press C to enter immersive clean mode with full-screen lyrics",
          },
          {
            title: "Quick Seek",
            text: "Click any lyrics line to jump to that moment",
          },
          {
            title: "Switch Services",
            text: "Try different sources if a song doesn't play",
          },
          { title: "Volume Control", text: "Press M to mute/unmute" },
        ];

        const state = {
          currentService:
            localStorage.getItem(CONSTANTS.DEFAULT_MUSIC_PROVIDER_KEY) ||
            "tidal",
          currentQuery: "",
          currentOffset: 0,
          isLoading: false,
          hasMore: true,
          trackQueue: [],
          currentTrackIndex: -1,
          isSeeking: false,
          isRepeatActive: false,
          lyricsVisible: false,
          cleanModeActive: false,
          lyricsData: null,
          activeLyricIndex: -1,
          lastRhythmPulse: 0,
          currentTipIndex: 0,
          tipsShown: new Set(),
          isUserScrolling: false,
          scrollTimeout: null,
          lastScrollTime: 0,
        };

        const elements = {
          audio: new Audio(),
          searchInput: document.getElementById("searchInput"),
          searchResults: document.getElementById("searchResults"),
          searchResultsSection: document.getElementById("searchResultsSection"),
          loadingMore: document.getElementById("loadingMore"),
          serviceButton: document.getElementById("serviceButton"),
          serviceButtonIcon: document.getElementById("serviceButtonIcon"),
          serviceName: document.getElementById("serviceName"),
          playPauseButton: document.getElementById("playPauseButton"),
          prevButton: document.getElementById("prevButton"),
          nextButton: document.getElementById("nextButton"),
          repeatButton: document.getElementById("repeatButton"),
          lyricsToggle: document.getElementById("lyricsToggle"),
          muteButton: document.getElementById("muteButton"),
          volumeSlider: document.getElementById("volumeSlider"),
          progressBar: document.getElementById("progressBar"),
          currentTime: document.getElementById("currentTime"),
          duration: document.getElementById("duration"),
          playerArtwork: document.getElementById("playerArtwork"),
          playerIcon: document.getElementById("playerIcon"),
          playerTitle: document.getElementById("playerTitle"),
          playerArtist: document.getElementById("playerArtist"),
          dropdownOverlay: document.getElementById("dropdownOverlay"),
          serviceDropdown: document.getElementById("serviceDropdown"),
          lyricsContainer: document.getElementById("lyricsContainer"),
          lyricsFallback: document.getElementById("lyricsFallback"),
          lyricsMainView: document.getElementById("lyricsMainView"),
          dynamicBg: document.getElementById("dynamicBg"),
          rhythmGlow: document.getElementById("rhythmGlow"),
          cleanModeToggle: document.getElementById("cleanModeToggle"),
          cleanModeOverlay: document.getElementById("cleanModeOverlay"),
          cleanModeExit: document.getElementById("cleanModeExit"),
          cleanArtwork: document.getElementById("cleanArtwork"),
          cleanIcon: document.getElementById("cleanIcon"),
          cleanLyrics: document.getElementById("cleanLyrics"),
          cleanTitle: document.getElementById("cleanTitle"),
          cleanArtist: document.getElementById("cleanArtist"),
          cleanPlayPause: document.getElementById("cleanPlayPause"),
          cleanPrev: document.getElementById("cleanPrev"),
          cleanNext: document.getElementById("cleanNext"),
          cleanProgressBar: document.getElementById("cleanProgressBar"),
          cleanCurrentTime: document.getElementById("cleanCurrentTime"),
          cleanDuration: document.getElementById("cleanDuration"),
          modalOverlay: document.getElementById("modalOverlay"),
          modalText: document.getElementById("modalText"),
          modalButton: document.getElementById("modalButton"),
          tipIndicator: document.getElementById("tipIndicator"),
          tipTitle: document.getElementById("tipTitle"),
          tipText: document.getElementById("tipText"),
          contentWrapper: document.getElementById("contentWrapper"),
          syncButton: document.getElementById("syncButton"),
        };

        const audioContext = {
          context: null,
          analyser: null,
          source: null,
          gainNode: null,
          lastVolume: 1,
          dataArray: null,
          isInitialized: false,
        };

        let animationFrameId = null;
        let karaokeRaf = null;
        let tipTimeout = null;

        function initializeAudioContext() {
          if (audioContext.isInitialized) return;
          try {
            audioContext.context = new (window.AudioContext ||
              window.webkitAudioContext)();
            audioContext.analyser = audioContext.context.createAnalyser();
            audioContext.gainNode = audioContext.context.createGain();
            audioContext.analyser.fftSize = 256;
            audioContext.dataArray = new Uint8Array(
              audioContext.analyser.frequencyBinCount,
            );
            audioContext.source = audioContext.context.createMediaElementSource(
              elements.audio,
            );
            audioContext.source.connect(audioContext.analyser);
            audioContext.analyser.connect(audioContext.gainNode);
            audioContext.gainNode.connect(audioContext.context.destination);
            audioContext.gainNode.gain.setValueAtTime(
              audioContext.lastVolume,
              audioContext.context.currentTime,
            );
            if (elements.volumeSlider) {
              elements.volumeSlider.value = audioContext.lastVolume;
              updateVolumeSliderBackground(audioContext.lastVolume);
            }
            audioContext.isInitialized = true;
          } catch (error) {
            console.error("Web Audio API initialization failed:", error);
          }
        }

        function updatePlayPauseIcon(isPlaying) {
          const iconName = isPlaying ? "pause-circle" : "play-circle";
          [elements.playPauseButton, elements.cleanPlayPause].forEach((btn) => {
            if (btn) {
              const icon = btn.querySelector("i");
              if (icon) {
                icon.setAttribute("data-lucide", iconName);
              }
            }
          });
          lucide.createIcons();
        }

        function updateMuteIcon(isMuted) {
          const iconName = isMuted ? "volume-x" : "volume-2";
          if (elements.muteButton) {
            const icon = elements.muteButton.querySelector("i");
            if (icon) icon.setAttribute("data-lucide", iconName);
            lucide.createIcons();
          }
        }

        function updateServiceIcon(service) {
          const iconMap = { soundcloud: "cloud", tidal: "disc-3" };
          const iconName = iconMap[service] || "disc-3";
          const serviceName =
            service.charAt(0).toUpperCase() + service.slice(1);

          if (elements.serviceButtonIcon) {
            elements.serviceButtonIcon.setAttribute("data-lucide", iconName);
          }
          if (elements.serviceName) {
            elements.serviceName.textContent = serviceName;
          }
          lucide.createIcons();
        }

        function setPlayerIconForService(service) {
          const iconMap = { soundcloud: "cloud", tidal: "disc-3" };
          const iconName = iconMap[service] || "disc-3";

          [elements.playerIcon, elements.cleanIcon].forEach((icon) => {
            if (icon) {
              icon.setAttribute("data-lucide", iconName);
              icon.style.opacity = "1";
            }
          });
          lucide.createIcons();
        }

        function updateVolumeSliderBackground(volume) {
          if (!elements.volumeSlider) return;
          const percentage = Math.round(volume * 100);
          const color =
            getComputedStyle(document.documentElement).getPropertyValue(
              "--color-1",
            ) || "#ffffff";
          elements.volumeSlider.style.background = `linear-gradient(to right, ${color} ${percentage}%, #000000 ${percentage}%)`;
        }

        function showTip(tip) {
          if (!elements.tipIndicator || state.tipsShown.has(tip.title)) return;
          elements.tipTitle.textContent = tip.title;
          elements.tipText.textContent = tip.text;
          elements.tipIndicator.classList.add("visible");
          lucide.createIcons();
          state.tipsShown.add(tip.title);
          if (tipTimeout) clearTimeout(tipTimeout);
          tipTimeout = setTimeout(() => {
            elements.tipIndicator.classList.remove("visible");
          }, CONSTANTS.TIP_DISPLAY_DURATION);
        }

        function showNextTip() {
          if (state.currentTipIndex < TIPS.length) {
            showTip(TIPS[state.currentTipIndex]);
            state.currentTipIndex++;
          }
        }

        function toggleLyricsView() {
          state.lyricsVisible = !state.lyricsVisible;

          if (state.lyricsVisible) {
            elements.searchResultsSection?.classList.remove("active");
            elements.lyricsMainView?.classList.add("active");
            elements.lyricsToggle?.classList.add("active");

            const track = state.trackQueue[state.currentTrackIndex];
            if (track && !state.lyricsData) {
              fetchLyricsForTrack(track);
            } else if (state.lyricsData) {
              renderLyricsInContainer(
                state.lyricsData,
                elements.lyricsContainer,
              );
              startKaraokeLoop();
            }
          } else {
            elements.lyricsMainView?.classList.remove("active");
            elements.lyricsToggle?.classList.remove("active");
            if (state.currentQuery) {
              elements.searchResultsSection?.classList.add("active");
            }
          }
        }

        function toggleCleanMode() {
          state.cleanModeActive = !state.cleanModeActive;

          if (state.cleanModeActive) {
            elements.cleanModeOverlay?.classList.add("active");
            elements.cleanModeToggle?.classList.add("active");

            const track = state.trackQueue[state.currentTrackIndex];
            if (track) {
              updateCleanModeUI(track);

              if (!state.lyricsData) {
                fetchLyricsForTrack(track);
              } else {
                renderLyricsInContainer(state.lyricsData, elements.cleanLyrics);
              }
            }
          } else {
            elements.cleanModeOverlay?.classList.remove("active");
            elements.cleanModeToggle?.classList.remove("active");
          }
        }

        function updateCleanModeUI(track) {
          if (elements.cleanTitle)
            elements.cleanTitle.textContent = track.title;
          if (elements.cleanArtist)
            elements.cleanArtist.textContent = track.artist;

          const existingImg = elements.cleanArtwork?.querySelector("img");
          if (existingImg) existingImg.remove();

          if (track.artwork && elements.cleanArtwork) {
            const img = document.createElement("img");
            img.crossOrigin = "anonymous";
            img.src = track.artwork;
            img.onload = () => img.classList.add("loaded");
            img.onerror = () => setPlayerIconForService(track.service);
            elements.cleanArtwork.insertBefore(
              img,
              elements.cleanArtwork.firstChild,
            );
          } else {
            setPlayerIconForService(track.service);
          }
        }

        function applyRhythmEffects() {
          if (!audioContext.isInitialized || !audioContext.analyser) return;
          audioContext.analyser.getByteFrequencyData(audioContext.dataArray);

          let sum = 0;
          for (let i = 0; i < audioContext.dataArray.length; i++) {
            sum += audioContext.dataArray[i];
          }
          const average = sum / audioContext.dataArray.length;

          if (elements.rhythmGlow) {
            const glowOpacity = Math.min((average / 255) * 0.3, 0.15);
            elements.rhythmGlow.style.opacity = glowOpacity;
          }
        }

        function drawVisualizer() {
          if (
            !elements.audio.paused &&
            audioContext.context &&
            audioContext.analyser
          ) {
            applyRhythmEffects();
          }
          if (!elements.audio.paused) {
            animationFrameId = requestAnimationFrame(drawVisualizer);
          }
        }

        function getDominantColors(img, count = 8) {
          try {
            if (window.ColorThief) {
              const colorThief = new ColorThief();
              const palette = colorThief.getPalette(img, count + 2, 10);
              const dominantColor = colorThief.getColor(img, 10);
              if (Array.isArray(palette) && palette.length > 0) {
                const allColors = [dominantColor, ...palette];
                return allColors
                  .slice(0, count)
                  .map((rgb) => enhanceColor(rgb))
                  .map(([r, g, b]) => rgbToHex(r, g, b));
              }
            }
          } catch (error) {
            console.warn("ColorThief failed:", error);
          }
          return ["#ffffff", "#cccccc", "#999999", "#666666"].slice(0, count);
        }

        function enhanceColor(rgb) {
          let [r, g, b] = rgb;
          const max = Math.max(r, g, b);
          const min = Math.min(r, g, b);
          const saturation = max === 0 ? 0 : (max - min) / max;

          if (saturation < 0.5) {
            const boost = 1.4;
            const avg = (r + g + b) / 3;
            r = Math.min(255, avg + (r - avg) * boost);
            g = Math.min(255, avg + (g - avg) * boost);
            b = Math.min(255, avg + (b - avg) * boost);
          }

          const brightness = (r + g + b) / 3;
          if (brightness < 70) {
            const lighten = 1.3;
            r = Math.min(255, r * lighten);
            g = Math.min(255, g * lighten);
            b = Math.min(255, b * lighten);
          }

          return [Math.round(r), Math.round(g), Math.round(b)];
        }

        function rgbToHex(r, g, b) {
          const toHex = (v) => {
            const hex = Math.max(0, Math.min(255, Math.round(v))).toString(16);
            return hex.length === 1 ? `0${hex}` : hex;
          };
          return `#${toHex(r)}${toHex(g)}${toHex(b)}`;
        }

        function hexToRgba(hex, alpha) {
          const clean = hex.replace("#", "");
          const bigint = parseInt(clean, 16);
          const r = (bigint >> 16) & 255;
          const g = (bigint >> 8) & 255;
          const b = bigint & 255;
          return `rgba(${r}, ${g}, ${b}, ${alpha})`;
        }

        function applyGradientFromImage(img) {
          if (!img) {
            updateDynamicColors(
              "#ffffff",
              "#cccccc",
              "#999999",
              "#666666",
              "#888888",
              "#aaaaaa",
              "#777777",
              "#999999",
            );
            return;
          }

          const colors = getDominantColors(img, 8);
          const [c1, c2, c3, c4, c5, c6, c7, c8] = colors;
          updateDynamicColors(c1, c2, c3, c4, c5, c6, c7, c8);
        }

        function updateDynamicColors(c1, c2, c3, c4, c5, c6, c7, c8) {
          const root = document.documentElement;
          root.style.setProperty("--orb-1", hexToRgba(c1, 0.92));
          root.style.setProperty("--orb-2", hexToRgba(c2, 0.85));
          root.style.setProperty("--orb-3", hexToRgba(c3, 0.8));
          root.style.setProperty("--orb-4", hexToRgba(c4, 0.75));
          root.style.setProperty("--color-1", c1);
          root.style.setProperty("--color-2", c2);
          root.style.setProperty("--color-3", c3);
          root.style.setProperty("--color-4", c4 || c1);
          root.style.setProperty("--color-5", c5 || c2);
          root.style.setProperty("--color-6", c6 || c3);
          root.style.setProperty("--color-7", c7 || c1);
          root.style.setProperty("--color-8", c8 || c2);
          updateVolumeSliderBackground(
            parseFloat(elements.volumeSlider?.value || "1"),
          );
        }

        function showModal(content) {
          if (!elements.modalOverlay) return;
          if (elements.modalText) elements.modalText.innerHTML = content;
          elements.modalOverlay.classList.add("visible");
        }

        function hideModal() {
          if (!elements.modalOverlay) return;
          elements.modalOverlay.classList.remove("visible");
        }

        function formatTime(totalSeconds) {
          if (Number.isNaN(totalSeconds) || totalSeconds < 0) return "0:00";
          const minutes = Math.floor(totalSeconds / 60);
          const seconds = Math.floor(totalSeconds % 60);
          return `${minutes}:${seconds.toString().padStart(2, "0")}`;
        }

        function updateProgressBar(value) {
          if (!elements.progressBar) return;

          const min = parseFloat(elements.progressBar.min) || 0;
          const max = parseFloat(elements.progressBar.max) || 100;
          const val = parseFloat(value) || 0;
          const percentage = ((val - min) / (max - min)) * 100;

          elements.progressBar.style.setProperty("--p", percentage + "%");

          if (elements.cleanProgressBar) {
            elements.cleanProgressBar.value = value;
            elements.cleanProgressBar.max = elements.progressBar.max;
          }
        }

        function escapeHtml(str) {
          const map = {
            "&": "&amp;",
            "<": "&lt;",
            ">": "&gt;",
            '"': "&quot;",
            "'": "&#39;",
          };
          return String(str).replace(/[&<>"']/g, (char) => map[char]);
        }

        function proxifyImageUrl(url) {
          if (!url) return null;
          if (url.startsWith("data:") || url.startsWith("blob:")) return url;

          try {
            const urlObj = new URL(url);
            if (urlObj.hostname === window.location.hostname) return url;
            if (
              urlObj.hostname === "localhost" ||
              urlObj.hostname === "127.0.0.1"
            )
              return url;

            if (CONSTANTS.CORS_PROXY && CONSTANTS.CORS_PROXY.trim() !== "") {
              return `${CONSTANTS.CORS_PROXY}${encodeURIComponent(url)}`;
            }

            return url;
          } catch {
            return url;
          }
        }

        function animateMusicProgressBar() {
          if (state.isSeeking) {
            requestAnimationFrame(animateMusicProgressBar);
            return;
          }

          if (!elements.audio.paused && !isNaN(elements.audio.duration)) {
            const currentTimeValue = elements.audio.currentTime;
            elements.progressBar.value = currentTimeValue;
            elements.currentTime.textContent = formatTime(currentTimeValue);
            if (elements.cleanCurrentTime)
              elements.cleanCurrentTime.textContent =
                formatTime(currentTimeValue);
            updateProgressBar(currentTimeValue);
          }

          if (!elements.audio.paused) {
            requestAnimationFrame(animateMusicProgressBar);
          }
        }

        function togglePlayback() {
          if (!elements.audio.src && state.trackQueue.length > 0) {
            loadAndPlayTrack(0);
          } else if (elements.audio.src) {
            if (elements.audio.paused) {
              elements.audio.play();
            } else {
              elements.audio.pause();
            }
          }
        }

        function skipNextTrack() {
          if (state.currentTrackIndex < state.trackQueue.length - 1) {
            loadAndPlayTrack(state.currentTrackIndex + 1);
          } else {
            elements.audio.pause();
            updatePlayPauseIcon(false);
          }
        }

        function skipPrevTrack() {
          if (elements.audio.currentTime > CONSTANTS.SEEK_THRESHOLD) {
            elements.audio.currentTime = 0;
          } else if (state.currentTrackIndex > 0) {
            loadAndPlayTrack(state.currentTrackIndex - 1);
          }
        }
        function loadAndPlayTrack(index) {
          if (index < 0 || index >= state.trackQueue.length) return;

          elements.audio.pause();
          elements.audio.src = "";

          const track = state.trackQueue[index];
          state.currentTrackIndex = index;

          document.querySelectorAll(".result-item.active").forEach((item) => {
            item.classList.remove("active");
          });

          const newItem = document.getElementById(`track-${track.id}`);
          newItem?.classList.add("active");

          updateTrackUI(track);

          state.lyricsData = null;
          elements.lyricsContainer.innerHTML = "";
          elements.lyricsFallback.textContent = "";
          if (elements.cleanLyrics) elements.cleanLyrics.innerHTML = "";

          fetchLyricsForTrack(track);

          loadArtwork(track);
          loadStreamUrl(track);
        }
        function updateTrackUI(track) {
          const title =
            track.service === "tidal" ? "Loading track..." : track.title;
          const artist =
            track.service === "tidal" ? "Tidal may take ~10s" : track.artist;

          if (elements.playerTitle) elements.playerTitle.textContent = title;
          if (elements.playerArtist) elements.playerArtist.textContent = artist;
          if (elements.cleanTitle) elements.cleanTitle.textContent = title;
          if (elements.cleanArtist) elements.cleanArtist.textContent = artist;

          elements.currentTime.textContent = "0:00";
          elements.duration.textContent = "";
          if (elements.cleanCurrentTime)
            elements.cleanCurrentTime.textContent = "0:00";
          if (elements.cleanDuration) elements.cleanDuration.textContent = "";
          elements.progressBar.value = 0;
          updateProgressBar(0);
          updatePlayPauseIcon(false);
        }
        function loadArtwork(track) {
          [elements.playerArtwork, elements.cleanArtwork].forEach(
            (container) => {
              if (!container) return;
              const existingImg = container.querySelector("img");
              existingImg?.remove();
              const icon = container.querySelector("i");
              if (icon) icon.style.opacity = "0";
            },
          );

          if (track.artwork) {
            const visibleImg = document.createElement("img");
            visibleImg.src = track.artwork;

            visibleImg.onerror = () => {
              handleArtworkError(track);
            };

            visibleImg.onload = () => {
              visibleImg.classList.add("loaded");

              const hiddenImg = document.createElement("img");
              hiddenImg.crossOrigin = "anonymous";
              hiddenImg.src = track.artwork;
              hiddenImg.style.display = "none";
              hiddenImg.style.position = "absolute";
              hiddenImg.style.opacity = "0";
              hiddenImg.style.pointerEvents = "none";

              hiddenImg.onload = () => {
                applyGradientFromImage(hiddenImg);
                setTimeout(() => hiddenImg.remove(), 100);
              };

              hiddenImg.onerror = () => {
                applyGradientFromImage(visibleImg);
                hiddenImg.remove();
              };

              document.body.appendChild(hiddenImg);
            };

            if (elements.playerArtwork) {
              elements.playerArtwork.insertBefore(
                visibleImg,
                elements.playerArtwork.firstChild,
              );
            }

            if (elements.cleanArtwork) {
              const cleanImg = visibleImg.cloneNode();
              cleanImg.src = track.artwork;
              cleanImg.onload = () => cleanImg.classList.add("loaded");
              cleanImg.onerror = () => handleArtworkError(track);
              elements.cleanArtwork.insertBefore(
                cleanImg,
                elements.cleanArtwork.firstChild,
              );
            }
          } else {
            handleArtworkError(track);
          }
        }

        function handleArtworkError(track) {
          setPlayerIconForService(track.service);
          applyGradientFromImage(null);
        }

        function loadStreamUrl(track) {
          if (track.service === "soundcloud") {
            const dlPath = track.url.split("/").slice(-2).join("/");
            fetchSoundCloudStreamUrl(dlPath, track);
          } else if (track.service === "tidal") {
            fetchTidalStreamUrl(track);
          }
        }

        async function fetchTidalStreamUrl(track) {
          initializeAudioContext();
          const quality = track.qualities?.includes("LOSSLESS")
            ? "lossless"
            : track.qualities?.includes("HIGH")
            ? "high"
            : "low";

          try {
            const response = await fetch(
              `https://sailforeducation.org/worker/music/tidal/download/${quality}/${track.id}`,
            );
            const data = await response.json();

            if (elements.playerTitle)
              elements.playerTitle.textContent = track.title;
            if (elements.playerArtist)
              elements.playerArtist.textContent = track.artist;
            if (elements.cleanTitle)
              elements.cleanTitle.textContent = track.title;
            if (elements.cleanArtist)
              elements.cleanArtist.textContent = track.artist;

            if (data?.streamUrl) {
              elements.audio.src = data.streamUrl;
              elements.audio.crossOrigin = "anonymous";
              elements.audio.load();
              elements.audio.play().catch(() => updatePlayPauseIcon(false));
            } else {
              throw new Error("No stream URL in Tidal response");
            }
          } catch (error) {
            console.error("Tidal stream URL fetch failed:", error);
            showModal("Playback is not supported for this track.");
            updatePlayPauseIcon(false);
            if (elements.playerTitle)
              elements.playerTitle.textContent = track.title;
            if (elements.playerArtist)
              elements.playerArtist.textContent = track.artist;
          }
        }

        async function fetchSoundCloudStreamUrl(downloadPath) {
          initializeAudioContext();

          try {
            const response = await fetch(
              `https://sailforeducation.org/worker/music/soundcloud/download/${downloadPath}`,
            );
            const data = await response.json();

            if (data?.streamUrl) {
              elements.audio.src = data.streamUrl;
              elements.audio.crossOrigin = "anonymous";
              elements.audio.load();

              elements.audio
                .play()
                .then(() => {
                  if (data.warning?.includes("30-second preview")) {
                    showModal(
                      "Only a 30-second preview is available.<br><br>Try switching sources with the service selector.",
                    );
                  }
                })
                .catch(() => updatePlayPauseIcon(false));
            } else {
              throw new Error("No stream URL in SoundCloud response");
            }
          } catch (error) {
            console.error("SoundCloud stream URL fetch failed:", error);
            showModal(
              "This track is not available on SoundCloud.<br><br>Try switching sources with the service selector.",
            );
            updatePlayPauseIcon(false);
          }
        }

        async function performSearch(query, offset, isNewSearch = false) {
          if (!query || (!isNewSearch && (state.isLoading || !state.hasMore)))
            return;

          if (!isNewSearch) {
            state.isLoading = true;
            elements.loadingMore.style.display = "flex";
          }

          try {
            if (isNewSearch) {
              elements.searchResults.innerHTML = "";
              state.trackQueue = [];
              elements.searchResultsSection?.classList.add("active");
              elements.lyricsMainView?.classList.remove("active");
            }

            const results = await fetchSearchResults(query, offset);
            displayResults(results.items);

            state.currentOffset += results.items.length;
            state.hasMore = results.hasMore;
          } catch (error) {
            console.error("Search failed:", error);
            if (isNewSearch) {
              elements.searchResults.innerHTML =
                '<div style="color: var(--muted-foreground); text-align: center; padding: 20px;">Search failed.</div>';
            }
            state.hasMore = false;
          } finally {
            if (!state.hasMore) {
              elements.loadingMore.style.display = "none";
              observer.unobserve(elements.loadingMore);
            }
            state.isLoading = false;
          }
        }

        async function fetchSearchResults(query, offset) {
          const encoded = encodeURIComponent(query).replace(/%20/g, "+");

          if (state.currentService === "tidal") {
            const page = Math.floor(offset / CONSTANTS.RESULTS_PER_PAGE) + 1;
            const url = `https://sailforeducation.org/worker/music/tidal/search/tracks?q=${encoded}&max=${CONSTANTS.RESULTS_PER_PAGE}&page=${page}`;
            const response = await fetch(url);
            if (!response.ok) throw new Error("Tidal API response not OK");
            const data = await response.json();
            const items = data.items.map((item) => ({
              id: item.id,
              title: item.title,
              artist: item.artists.map((a) => a.name).join(", "),
              artwork: `https://resources.tidal.com/images/${item.album.cover.replace(
                /-/g,
                "/",
              )}/320x320.jpg`,
              service: "tidal",
              qualities: item.mediaMetadata.tags,
            }));
            return {
              items,
              hasMore: offset + items.length < data.totalNumberOfItems,
            };
          } else if (state.currentService === "soundcloud") {
            const url = `https://sailforeducation.org/worker/music/soundcloud/search/${encoded}?max=${CONSTANTS.RESULTS_PER_PAGE}&offset=${offset}`;
            const response = await fetch(url);
            if (!response.ok) throw new Error("SoundCloud API response not OK");
            const data = await response.json();
            const items = data.results.map((result) => ({
              ...result,
              id: result.url.split("/").pop(),
              service: "soundcloud",
            }));
            return { items, hasMore: data.hasMore || false };
          }
          return { items: [], hasMore: false };
        }

        function displayResults(results) {
          const initialQueueLength = state.trackQueue.length;

          results.forEach((result, index) => {
            state.trackQueue.push(result);
            const trackIndex = initialQueueLength + index;

            const item = document.createElement("div");
            item.className = "result-item";
            item.id = `track-${result.id}`;

            const artworkHtml = result.artwork
              ? `<img src="${
                  result.artwork
                }" onerror="this.onerror=null; this.src='${proxifyImageUrl(
                  result.artwork,
                )}';">`
              : '<i data-lucide="music" style="color:var(--muted-foreground);width:2rem;height:2rem;margin:auto;"></i>';

            item.innerHTML = `
        <div class="result-art">${artworkHtml}</div>
        <div class="result-text">
          <div class="result-title">${escapeHtml(result.title)}</div>
          <div class="result-artist">${escapeHtml(result.artist)}</div>
        </div>
      `;

            item.addEventListener("click", () => loadAndPlayTrack(trackIndex));
            elements.searchResults.appendChild(item);

            requestAnimationFrame(() => item.classList.add("visible"));
          });

          lucide.createIcons();

          if (state.hasMore) {
            elements.searchResults.appendChild(elements.loadingMore);
          }
        }

        function parseLRC(lrcText) {
          if (!lrcText || typeof lrcText !== "string") return [];
          const lines = lrcText.split(/\r?\n/);
          const parsed = [];
          const timeRegex = /\[(\d{1,2}:\d{2}(?:\.\d{1,3})?)\]/g;

          for (const raw of lines) {
            const line = raw.trim();
            if (!line) continue;
            const times = [];
            let match;
            while ((match = timeRegex.exec(line)) !== null) {
              times.push(match[1]);
            }
            const text = line.replace(timeRegex, "").trim();
            for (const timeStr of times) {
              const [minutes, seconds] = timeStr.split(":");
              const totalSeconds =
                parseInt(minutes, 10) * 60 + parseFloat(seconds);
              parsed.push({ time: totalSeconds, text });
            }
          }
          return parsed.sort((a, b) => a.time - b.time);
        }

        function extractLyricsFromBody(body) {
          let lrc = null;
          let plain = null;
          if (!body) return { lrc, plain };

          if (typeof body === "string") {
            if (body.match(/\[\d{1,2}:\d{2}/)) {
              lrc = body;
            } else {
              plain = body;
            }
            return { lrc, plain };
          }

          const candidates = [
            "syncedLyrics",
            "lrc",
            "lyrics",
            "data",
            "content",
            "result",
            "text",
          ];
          for (const key of candidates) {
            if (key in body && typeof body[key] === "string") {
              const value = body[key];
              if (value.match(/\[\d{1,2}:\d{2}/)) {
                lrc = value;
                break;
              } else {
                plain = plain || value;
              }
            }
          }
          return { lrc, plain };
        }

        async function fetchLyricsForTrack(track) {
          state.lyricsData = null;
          if (!track?.title) return null;

          const primaryResult = await fetchFromLrcLib(track);
          if (primaryResult) return primaryResult;

          const secondaryResult = await fetchFromLyricApi(track);
          if (secondaryResult) return secondaryResult;

          const firstArtistOnly = extractFirstArtist(track.artist);
          if (firstArtistOnly !== track.artist) {
            const modifiedTrack = { ...track, artist: firstArtistOnly };
            const tertiaryResult = await fetchFromLrcLib(modifiedTrack);
            if (tertiaryResult) return tertiaryResult;
            const quaternaryResult = await fetchFromLyricApi(modifiedTrack);
            if (quaternaryResult) return quaternaryResult;
          }

          if (elements.lyricsFallback) {
            const funnyQuotes = [
              "We still don't have those lyrics",
              "The dog ate the lyrics",
              "Lyrics not found. Have you tried turning it off and on again?",
              "The artist forgot to write the lyrics down",
              "The lyrics went out for cigarettes and never came back",
              "Allegedly, there are no lyrics",
              "The lyrics are on another app",
              "The lyrics said no",
              "I forgot to upload the lyrics",
              "These lyrics are classified",
              "The lyrics are busy, please try again later",
              "Lyrics sold separately",
              "The lyrics are unlockable on the DLC",
            ];

            const randomQuote =
              funnyQuotes[Math.floor(Math.random() * funnyQuotes.length)];
            elements.lyricsFallback.textContent = randomQuote;
            elements.lyricsFallback.style.fontFamily =
              "'Spotify Mix', sans-serif";
          }
          return null;
        }

        function extractFirstArtist(artistString) {
          if (!artistString) return "";
          const separators = [
            ",",
            "&",
            "feat.",
            "ft.",
            "featuring",
            "•",
            "×",
            "x",
          ];
          let firstArtist = artistString;

          for (const separator of separators) {
            const index = artistString
              .toLowerCase()
              .indexOf(separator.toLowerCase());
            if (index !== -1) {
              firstArtist = artistString.substring(0, index);
              break;
            }
          }
          return firstArtist.trim();
        }

        async function fetchFromLrcLib(track) {
          const params = new URLSearchParams({
            track_name: track.title || "",
            artist_name: track.artist || "",
          });

          if (track.album) params.append("album_name", track.album);
          if (track.duration)
            params.append("duration", Math.round(track.duration));

          const url = `https://lrclib.net/api/get?${params.toString()}`;

          try {
            const response = await fetch(url, {
              method: "GET",
              headers: { Accept: "application/json" },
            });

            if (!response.ok) return null;

            const contentType = response.headers.get("content-type") || "";
            let body;

            if (contentType.includes("application/json")) {
              body = await response.json();
            } else {
              const text = await response.text();
              try {
                body = JSON.parse(text);
              } catch {
                body = text;
              }
            }

            const { lrc, plain } = extractLyricsFromBody(body);

            if (lrc) {
              const parsed = parseLRC(lrc);
              if (parsed?.length) {
                state.lyricsData = parsed;
                if (state.lyricsVisible)
                  renderLyricsInContainer(
                    state.lyricsData,
                    elements.lyricsContainer,
                  );
                if (state.cleanModeActive)
                  renderLyricsInContainer(
                    state.lyricsData,
                    elements.cleanLyrics,
                  );
                startKaraokeLoop();
                return state.lyricsData;
              }
            }

            if (plain) {
              renderPlainLyrics(plain);
              return null;
            }

            return null;
          } catch (error) {
            console.error("LrcLib fetch failed:", error);
            return null;
          }
        }

        async function fetchFromLyricApi(track) {
          if (!track?.artist || !track?.title) return null;

          const query = `${track.artist} ${track.title}`;
          const encodedQuery = encodeURIComponent(query);
          const url = `https://sailforeducation.org/api/lyric/search?q=${encodedQuery}`;

          try {
            const response = await fetch(url);
            if (!response.ok) return null;

            const data = await response.json();
            if (!Array.isArray(data) || data.length === 0) return null;

            const bestMatch = findBestLyricsMatch(data, track);
            if (!bestMatch) return null;

            const syncedLyrics = bestMatch.syncedLyrics;
            const plainLyrics = bestMatch.plainLyrics;

            if (syncedLyrics) {
              const parsed = parseLRC(syncedLyrics);
              if (parsed?.length) {
                state.lyricsData = parsed;
                if (state.lyricsVisible)
                  renderLyricsInContainer(
                    state.lyricsData,
                    elements.lyricsContainer,
                  );
                if (state.cleanModeActive)
                  renderLyricsInContainer(
                    state.lyricsData,
                    elements.cleanLyrics,
                  );
                startKaraokeLoop();
                return state.lyricsData;
              }
            }

            if (plainLyrics) {
              renderPlainLyrics(plainLyrics);
              return null;
            }

            return null;
          } catch (error) {
            console.error("Lyric API fetch failed:", error);
            return null;
          }
        }

        function findBestLyricsMatch(results, track) {
          if (results.length === 1) return results[0];

          const normalizeString = (str) =>
            String(str || "")
              .toLowerCase()
              .trim()
              .replace(/[^\w\s]/g, "");
          const targetTitle = normalizeString(track.title);
          const targetArtist = normalizeString(track.artist);
          const targetDuration = track.duration || 0;

          let bestMatch = null;
          let bestScore = -1;

          for (const result of results) {
            const resultTitle = normalizeString(
              result.trackName || result.name,
            );
            const resultArtist = normalizeString(result.artistName);
            const resultDuration = result.duration || 0;

            let score = 0;

            if (resultTitle === targetTitle) score += 50;
            else if (
              resultTitle.includes(targetTitle) ||
              targetTitle.includes(resultTitle)
            )
              score += 25;

            if (resultArtist === targetArtist) score += 30;
            else if (
              resultArtist.includes(targetArtist) ||
              targetArtist.includes(resultArtist)
            )
              score += 15;

            if (targetDuration > 0 && resultDuration > 0) {
              const durationDiff = Math.abs(resultDuration - targetDuration);
              if (durationDiff <= 5) score += 20;
              else if (durationDiff <= 10) score += 10;
            }

            if (result.syncedLyrics) score += 10;

            if (score > bestScore) {
              bestScore = score;
              bestMatch = result;
            }
          }

          return bestMatch;
        }

        function renderLyricsInContainer(lines, container) {
          if (!container || !lines?.length) return;

          container.innerHTML = "";

          lines.forEach((line, index) => {
            const element = document.createElement("div");
            element.className = "lyrics-line";
            element.dataset.index = String(index);
            element.dataset.time = String(line.time);

            const words = (line.text || "").split(/(\s+)/);
            const lineTextDiv = document.createElement("div");
            lineTextDiv.className = "line-text";

            words.forEach((word, wordIndex) => {
              if (word.trim()) {
                const wordSpan = document.createElement("span");
                wordSpan.className = "word";
                wordSpan.dataset.wordIndex = String(wordIndex);
                wordSpan.textContent = word;
                lineTextDiv.appendChild(wordSpan);
              } else {
                lineTextDiv.appendChild(document.createTextNode(word));
              }
            });

            element.appendChild(lineTextDiv);

            element.addEventListener("click", () => {
              if (!Number.isNaN(line.time)) {
                elements.audio.currentTime = Math.max(0, line.time - 0.05);
                if (elements.audio.paused) {
                  elements.audio.play().catch(() => {});
                }
                updateKaraokeOnce();
              }
            });

            container.appendChild(element);
          });
        }

        function renderPlainLyrics(text) {
          const normalized = String(text).trim();
          if (!normalized) return;

          if (state.lyricsVisible && elements.lyricsContainer) {
            elements.lyricsContainer.innerHTML = "";
            const element = document.createElement("div");
            element.className = "lyrics-line visible";
            element.style.color = "rgba(255, 255, 255, 0.7)";
            element.style.fontSize = "1.2rem";
            element.innerHTML = `<div class="line-text">${escapeHtml(
              normalized,
            ).replace(/\n/g, "<br>")}</div>`;
            elements.lyricsContainer.appendChild(element);
          }

          if (state.cleanModeActive && elements.cleanLyrics) {
            elements.cleanLyrics.innerHTML = "";
            const element = document.createElement("div");
            element.className = "lyrics-line visible";
            element.style.color = "rgba(255, 255, 255, 0.7)";
            element.style.fontSize = "1.5rem";
            element.innerHTML = `<div class="line-text">${escapeHtml(
              normalized,
            ).replace(/\n/g, "<br>")}</div>`;
            elements.cleanLyrics.appendChild(element);
          }

          stopKaraokeLoop();
        }

        function updateKaraokeOnce() {
          if (!state.lyricsData?.length) return stopKaraokeLoop();

          const currentTime = elements.audio.currentTime || 0;
          let index = state.lyricsData.length - 1;

          for (let i = 0; i < state.lyricsData.length; i++) {
            if (state.lyricsData[i].time > currentTime) {
              index = Math.max(0, i - 1);
              break;
            }
          }

          if (index !== state.activeLyricIndex) {
            const containers = [
              elements.lyricsContainer,
              elements.cleanLyrics,
            ].filter(Boolean);

            containers.forEach((container) => {
              const allLines = container.querySelectorAll(".lyrics-line");
              allLines.forEach((line) => {
                line.classList.remove("active");

                line
                  .querySelectorAll(".word")
                  .forEach((w) => w.classList.remove("active-word"));
              });

              const activeLine = container.querySelector(
                `.lyrics-line[data-index="${index}"]`,
              );

              if (activeLine) {
                activeLine.classList.add("active");

                if (!state.isUserScrolling) {
                  try {
                    activeLine.scrollIntoView({
                      block: "center",
                      behavior: "smooth",
                    });
                  } catch (error) {
                    console.warn("Scroll into view failed:", error);
                  }
                }
              }
            });

            state.activeLyricIndex = index;
          }

          animateWordsInActiveLine(index, currentTime);
        }

        function animateWordsInActiveLine(lineIndex, currentTime) {
          const containers = [
            elements.lyricsContainer,
            elements.cleanLyrics,
          ].filter(Boolean);

          containers.forEach((container) => {
            const activeLine = container.querySelector(
              `.lyrics-line[data-index="${lineIndex}"]`,
            );
            if (!activeLine) return;

            const words = activeLine.querySelectorAll(".word");
            if (words.length === 0) return;

            const lineStartTime = parseFloat(activeLine.dataset.time);
            const nextLineIndex = lineIndex + 1;
            const nextLine = container.querySelector(
              `.lyrics-line[data-index="${nextLineIndex}"]`,
            );
            const lineEndTime = nextLine
              ? parseFloat(nextLine.dataset.time)
              : lineStartTime + 5;

            const lineDuration = lineEndTime - lineStartTime;
            const timePerWord = lineDuration / words.length;
            const timeSinceLineStart = currentTime - lineStartTime;

            const activeWordIndex = Math.floor(
              timeSinceLineStart / timePerWord,
            );

            words.forEach((word, idx) => {
              if (idx === activeWordIndex) {
                word.classList.add("active-word");
              } else {
                word.classList.remove("active-word");
              }
            });
          });
        }

        function setupScrollDetection() {
          const scrollContainers = [
            elements.lyricsScrollContainer,
            elements.cleanLyrics,
          ].filter(Boolean);

          scrollContainers.forEach((container) => {
            container.addEventListener("scroll", () => {
              const now = Date.now();
              state.lastScrollTime = now;

              if (!state.isUserScrolling) {
                state.isUserScrolling = true;
                elements.syncButton?.classList.add("visible");
              }

              clearTimeout(state.scrollTimeout);
              state.scrollTimeout = setTimeout(() => {
                if (Date.now() - state.lastScrollTime >= 3000) {
                  state.isUserScrolling = false;
                  elements.syncButton?.classList.remove("visible");
                }
              }, 3000);
            });
          });
        }
        function karaokeLoop() {
          updateKaraokeOnce();
          karaokeRaf = requestAnimationFrame(karaokeLoop);
        }

        function startKaraokeLoop() {
          if (!karaokeRaf && state.lyricsData?.length) {
            karaokeRaf = requestAnimationFrame(karaokeLoop);
          }
        }

        function stopKaraokeLoop() {
          if (karaokeRaf) {
            cancelAnimationFrame(karaokeRaf);
            karaokeRaf = null;
          }
        }

        elements.playPauseButton?.addEventListener("click", togglePlayback);
        elements.cleanPlayPause?.addEventListener("click", togglePlayback);
        elements.nextButton?.addEventListener("click", skipNextTrack);
        elements.cleanNext?.addEventListener("click", skipNextTrack);
        elements.prevButton?.addEventListener("click", skipPrevTrack);
        elements.cleanPrev?.addEventListener("click", skipPrevTrack);

        elements.repeatButton?.addEventListener("click", () => {
          state.isRepeatActive = !state.isRepeatActive;
          elements.repeatButton?.classList.toggle(
            "active",
            state.isRepeatActive,
          );
        });

        elements.lyricsToggle?.addEventListener("click", toggleLyricsView);
        elements.cleanModeToggle?.addEventListener("click", toggleCleanMode);
        elements.cleanModeExit?.addEventListener("click", toggleCleanMode);
        elements.syncButton?.addEventListener("click", () => {
          state.isUserScrolling = false;
          elements.syncButton?.classList.remove("visible");

          const containers = [
            elements.lyricsContainer,
            elements.cleanLyrics,
          ].filter(Boolean);
          containers.forEach((container) => {
            const activeLine = container.querySelector(
              `.lyrics-line[data-index="${state.activeLyricIndex}"]`,
            );
            if (activeLine) {
              activeLine.scrollIntoView({
                block: "center",
                behavior: "smooth",
              });
            }
          });
        });

        elements.muteButton?.addEventListener("click", () => {
          initializeAudioContext();
          if (!audioContext.context || !audioContext.gainNode) return;

          const currentVolume = audioContext.gainNode.gain.value;
          if (currentVolume > 0) {
            audioContext.lastVolume = currentVolume;
            audioContext.gainNode.gain.setValueAtTime(
              0,
              audioContext.context.currentTime,
            );
            updateMuteIcon(true);
            elements.audio.muted = true;
            elements.volumeSlider.value = 0;
            updateVolumeSliderBackground(0);
          } else {
            const restoreVolume = audioContext.lastVolume || 1;
            audioContext.gainNode.gain.setValueAtTime(
              restoreVolume,
              audioContext.context.currentTime,
            );
            updateMuteIcon(false);
            elements.audio.muted = false;
            elements.volumeSlider.value = restoreVolume;
            updateVolumeSliderBackground(restoreVolume);
          }
        });

        elements.volumeSlider?.addEventListener("input", (e) => {
          initializeAudioContext();
          if (!audioContext.context || !audioContext.gainNode) return;

          const volume = parseFloat(e.target.value);
          audioContext.lastVolume = volume;

          try {
            audioContext.gainNode.gain.setValueAtTime(
              volume,
              audioContext.context.currentTime,
            );
          } catch (error) {
            console.warn("Volume set failed:", error);
          }

          elements.audio.muted = volume === 0;
          updateMuteIcon(volume === 0);
          updateVolumeSliderBackground(volume);
        });

        elements.serviceButton?.addEventListener("click", (e) => {
          e.stopPropagation();
          const rect = elements.serviceButton.getBoundingClientRect();
          elements.serviceDropdown.style.top = `${rect.bottom + 8}px`;
          elements.serviceDropdown.style.left = `${rect.left}px`;
          elements.serviceDropdown.classList.toggle("visible");
          elements.dropdownOverlay.classList.toggle("visible");
        });

        elements.dropdownOverlay?.addEventListener("click", () => {
          elements.serviceDropdown?.classList.remove("visible");
          elements.dropdownOverlay?.classList.remove("visible");
        });

        elements.serviceDropdown
          ?.querySelectorAll(".dropdown-option")
          .forEach((option) => {
            option.addEventListener("click", function () {
              const newService = this.dataset.service;
              state.currentService = newService;
              localStorage.setItem(
                CONSTANTS.DEFAULT_MUSIC_PROVIDER_KEY,
                newService,
              );
              updateServiceIcon(newService);
              elements.serviceDropdown.classList.remove("visible");
              elements.dropdownOverlay.classList.remove("visible");

              if (state.currentQuery) {
                state.isLoading = true;
                state.currentOffset = 0;
                state.hasMore = true;
                observer.unobserve(elements.loadingMore);
                elements.loadingMore.style.display = "flex";
                performSearch(state.currentQuery, 0, true);
              }
            });
          });

        let searchTimeout;
        elements.searchInput?.addEventListener("input", () => {
          clearTimeout(searchTimeout);
          searchTimeout = setTimeout(() => {
            state.currentQuery = elements.searchInput.value.trim();
            if (state.currentQuery) {
              state.isLoading = true;
              state.currentOffset = 0;
              state.hasMore = true;
              observer.unobserve(elements.loadingMore);
              elements.loadingMore.style.display = "flex";
              performSearch(state.currentQuery, 0, true);
            } else {
              elements.searchResults.innerHTML = "";
              state.trackQueue = [];
              state.currentOffset = 0;
              state.hasMore = true;
              elements.loadingMore.style.display = "none";
              state.isLoading = false;
              elements.searchResultsSection?.classList.remove("active");
            }
          }, CONSTANTS.SEARCH_DEBOUNCE);
        });

        elements.progressBar?.addEventListener("mousedown", () => {
          state.isSeeking = true;
        });

        elements.progressBar?.addEventListener("mouseup", () => {
          state.isSeeking = false;
          requestAnimationFrame(animateMusicProgressBar);
        });

        elements.progressBar?.addEventListener("change", () => {
          elements.audio.currentTime = elements.progressBar.value;
          state.isSeeking = false;
        });

        elements.progressBar?.addEventListener("input", () => {
          elements.currentTime.textContent = formatTime(
            elements.progressBar.value,
          );
          updateProgressBar(elements.progressBar.value);
        });

        elements.cleanProgressBar?.addEventListener("change", () => {
          elements.audio.currentTime = elements.cleanProgressBar.value;
          if (elements.progressBar)
            elements.progressBar.value = elements.cleanProgressBar.value;
        });

        document.addEventListener("keydown", (e) => {
          if (e.target.tagName === "INPUT" || e.target.tagName === "TEXTAREA")
            return;

          const key = e.key.toLowerCase();
          switch (key) {
            case " ":
              e.preventDefault();
              togglePlayback();
              break;
            case "arrowleft":
              e.preventDefault();
              skipPrevTrack();
              break;
            case "arrowright":
              e.preventDefault();
              skipNextTrack();
              break;
            case "l":
              e.preventDefault();
              toggleLyricsView();
              break;
            case "c":
              e.preventDefault();
              toggleCleanMode();
              break;
            case "m":
              e.preventDefault();
              elements.muteButton?.click();
              break;
            case "r":
              e.preventDefault();
              elements.repeatButton?.click();
              break;
            case "f":
              e.preventDefault();
              if (document.fullscreenElement) {
                document.exitFullscreen();
              } else {
                document.documentElement.requestFullscreen();
              }
              break;
            case "escape":
              if (state.cleanModeActive) {
                toggleCleanMode();
              }
              break;
          }
        });

        elements.audio.addEventListener("loadedmetadata", () => {
          elements.progressBar.max = elements.audio.duration;
          elements.duration.textContent = formatTime(elements.audio.duration);
          elements.currentTime.textContent = "0:00";
          if (elements.cleanDuration)
            elements.cleanDuration.textContent = formatTime(
              elements.audio.duration,
            );
          if (elements.cleanCurrentTime)
            elements.cleanCurrentTime.textContent = "0:00";
          updateProgressBar(0);
        });

        elements.audio.addEventListener("play", () => {
          updatePlayPauseIcon(true);
          document.getElementById("dynamicBg")?.classList.add("playing");
          if (audioContext.context?.state === "suspended") {
            audioContext.context.resume();
          }
          if (audioContext.isInitialized && !animationFrameId) {
            drawVisualizer();
          }
          requestAnimationFrame(animateMusicProgressBar);
          if (state.lyricsData?.length) {
            startKaraokeLoop();
          }
          if (state.currentTipIndex === 0) {
            setTimeout(() => showNextTip(), 3000);
          }
        });

        elements.audio.addEventListener("pause", () => {
          updatePlayPauseIcon(false);
          document.getElementById("dynamicBg")?.classList.remove("playing");
          stopKaraokeLoop();
        });

        elements.audio.addEventListener("ended", () => {
          if (state.isRepeatActive) {
            elements.audio.currentTime = 0;
            elements.audio.play();
            return;
          }
          updatePlayPauseIcon(false);
          elements.progressBar.value = 0;
          elements.currentTime.textContent = "0:00";
          updateProgressBar(0);
          skipNextTrack();
        });

        elements.modalButton?.addEventListener("click", hideModal);

        const observer = new IntersectionObserver(
          (entries) => {
            entries.forEach((entry) => {
              if (
                entry.isIntersecting &&
                !state.isLoading &&
                state.hasMore &&
                state.currentQuery
              ) {
                observer.unobserve(elements.loadingMore);
                performSearch(state.currentQuery, state.currentOffset, false);
              }
            });
          },
          { root: elements.searchResults, threshold: 0.1 },
        );

        updateServiceIcon(state.currentService);
        elements.loadingMore.style.display = "none";
        updateProgressBar(0);
        elements.progressBar.max = 100;
        lucide.createIcons();
        setTimeout(() => showNextTip(), 2000);
        setupScrollDetection();
      });

      lucide.createIcons();

      function setupMobileMenu() {
        const mobileMenuBtn = document.getElementById("mobileMenuBtn");
        const mobileOverlay = document.getElementById("mobileOverlay");
        const sidebar = document.querySelector(".sidebar");
        const mobileHeader = document.querySelector(".mobile-header");

        if (window.innerWidth <= 768) {
          if (mobileHeader) mobileHeader.style.display = "flex";
        }

        function toggleMobileMenu() {
          sidebar?.classList.toggle("mobile-open");
          mobileOverlay?.classList.toggle("visible");
          document.body.style.overflow = sidebar?.classList.contains(
            "mobile-open",
          )
            ? "hidden"
            : "";
        }

        function closeMobileMenu() {
          sidebar?.classList.remove("mobile-open");
          mobileOverlay?.classList.remove("visible");
          document.body.style.overflow = "";
        }

        mobileMenuBtn?.addEventListener("click", toggleMobileMenu);
        mobileOverlay?.addEventListener("click", closeMobileMenu);

        document.querySelectorAll(".sidebar .nav-item").forEach((item) => {
          item.addEventListener("click", () => {
            if (window.innerWidth <= 768) {
              closeMobileMenu();
            }
          });
        });

        let resizeTimer;
        window.addEventListener("resize", () => {
          clearTimeout(resizeTimer);
          resizeTimer = setTimeout(() => {
            if (window.innerWidth <= 768) {
              if (mobileHeader) mobileHeader.style.display = "flex";
            } else {
              if (mobileHeader) mobileHeader.style.display = "none";
              closeMobileMenu();
            }
          }, 250);
        });

        let touchStartY = 0;
        sidebar?.addEventListener("touchstart", (e) => {
          touchStartY = e.touches[0].clientY;
        });

        sidebar?.addEventListener(
          "touchmove",
          (e) => {
            if (sidebar.classList.contains("mobile-open")) {
              const touchY = e.touches[0].clientY;
              const touchDelta = touchY - touchStartY;
              const isScrollingUp = touchDelta > 0;
              const isScrollingDown = touchDelta < 0;
              const isAtTop = sidebar.scrollTop === 0;
              const isAtBottom =
                sidebar.scrollHeight - sidebar.scrollTop ===
                sidebar.clientHeight;

              if (
                (isScrollingUp && isAtTop) ||
                (isScrollingDown && isAtBottom)
              ) {
                e.preventDefault();
              }
            }
          },
          { passive: false },
        );
      }

      function setupSwipeGestures() {
        let touchStartX = 0;
        let touchEndX = 0;

        const threshold = 50;
        const sidebar = document.querySelector(".sidebar");
        const mobileOverlay = document.getElementById("mobileOverlay");

        function handleSwipe() {
          const swipeDistance = touchEndX - touchStartX;

          if (Math.abs(swipeDistance) > threshold) {
            if (
              swipeDistance > 0 &&
              touchStartX < 50 &&
              window.innerWidth <= 768
            ) {
              sidebar?.classList.add("mobile-open");
              mobileOverlay?.classList.add("visible");
              document.body.style.overflow = "hidden";
            } else if (
              swipeDistance < 0 &&
              sidebar?.classList.contains("mobile-open")
            ) {
              sidebar?.classList.remove("mobile-open");
              mobileOverlay?.classList.remove("visible");
              document.body.style.overflow = "";
            }
          }
        }

        document.addEventListener(
          "touchstart",
          (e) => {
            touchStartX = e.changedTouches[0].screenX;
          },
          { passive: true },
        );

        document.addEventListener(
          "touchend",
          (e) => {
            touchEndX = e.changedTouches[0].screenX;
            handleSwipe();
          },
          { passive: true },
        );
      }

      if ("ontouchstart" in window || navigator.maxTouchPoints > 0) {
        document.addEventListener("DOMContentLoaded", () => {
          setupMobileMenu();
          setupSwipeGestures();
        });
      } else {
        document.addEventListener("DOMContentLoaded", setupMobileMenu);
      }
    </script>
  </body>
</html>
